<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="javascript.js" defer></script>
        <title>Calculator</title>
    </head>

    <body>

        <div id="main">

            <div id="calculator">

                <div class="display">1+2=3</div>

                <div class="keys">

                    <button id="num" class="0">0</button>
                    <button id="num" class="1">1</button>
                    <button id="num" class="2">2</button>
                    <button id="num" class="3">3</button>
                    <button id="num" class="4">4</button>
                    <button id="num" class="5">5</button>
                    <button id="num" class="6">6</button>
                    <button id="num" class="7">7</button>
                    <button id="num" class="8">8</button>
                    <button id="num" class="9">9</button>
                    <button id="oper" class="+">+</button>
                    <button id="oper" class="-">-</button>
                    <button id="oper" class="*">*</button>
                    <button id="oper" class="/">/</button>
                    <button id="equal" class="=">=</button>
                    <!-- <button id="decimal" class=".">.</button> -->
                    <button class="clear">clear</button>

                </div>

            </div>

        </div>

    </body>
</html>
